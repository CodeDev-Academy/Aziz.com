version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: furniture_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: furniture_db
      MYSQL_USER: furniture_user
      MYSQL_PASSWORD: furniture_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
